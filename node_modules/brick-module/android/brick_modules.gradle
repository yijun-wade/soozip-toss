/*
 * Brick Modules Gradle Configuration
 * This file provides automatic configuration for brick modules in React Native projects.
 * 
 * Usage: Add to settings.gradle only:
 * apply from: file("../node_modules/brick-module/android/brick_modules.gradle")
 * applyBrickModules(settings, [projectRoot: "../", appProject: "app"])
 */

import groovy.json.JsonSlurper

// =============================================================================
// Utility Functions - Store as ext properties for global access
// =============================================================================

ext.brickLog = { message ->
    println("🧱 BrickModules: $message")
}

ext.resolveModule = { workingDir, moduleName ->
    try {
        def proc = ['node', '-p', "require.resolve('${moduleName}/package.json')"].execute(null, workingDir)
        proc.waitFor()
        
        if (proc.exitValue() == 0) {
            def packageJsonPath = proc.text.trim()
            if (packageJsonPath && !packageJsonPath.isEmpty()) {
                return new File(packageJsonPath).parentFile
            }
        }
    } catch (Exception e) {
        // Silent fail - module not found
    }
    return null
}

ext.readPackageJson = { File packageJsonFile ->
    if (!packageJsonFile.exists()) return null
    try {
        return new JsonSlurper().parse(packageJsonFile)
    } catch (Exception e) {
        return null
    }
}

// Removed discovery helpers; explicit appPath is required

ext.getBrickAndroidPath = { projectRoot ->
    // Read brick.json from explicit project root
    try {
        def brickConfigFile = new File(projectRoot, 'brick.json')
        if (brickConfigFile.exists()) {
            def config = new JsonSlurper().parse(brickConfigFile)
            def androidPath = config?.output?.android
            if (androidPath && !androidPath.isEmpty()) {
                if (new File(androidPath).isAbsolute()) {
                    println("[Brick] Warning: Using absolute path for Android output is not recommended: ${androidPath}")
                    return androidPath
                }
                return new File(projectRoot, androidPath).canonicalPath
            }
        }
    } catch (Exception e) {
        println("[Brick] Warning: Failed to read brick.json from ${projectRoot}: ${e.message}")
    }
    
    // Default: android/.brick in project root
    return new File(projectRoot, 'android/.brick').canonicalPath
}

ext.getBrickAndroidAppPath = { projectRoot ->
    // Read brick.json from explicit project root
    try {
        def brickConfigFile = new File(projectRoot, 'brick.json')
        if (brickConfigFile.exists()) {
            def config = new JsonSlurper().parse(brickConfigFile)
            def androidAppPath = config?.output?.androidAppPath
            if (androidAppPath && !androidAppPath.isEmpty()) {
                if (new File(androidAppPath).isAbsolute()) {
                    println("[Brick] Warning: Using absolute path for Android app path is not recommended: ${androidAppPath}")
                    return androidAppPath
                }
                return new File(projectRoot, androidAppPath).canonicalPath
            }
        }
    } catch (Exception e) {
        println("[Brick] Warning: Failed to read brick.json from ${projectRoot}: ${e.message}")
    }

    // Default: android/app in project root
    return new File(projectRoot, 'android/app').canonicalPath
}

ext.getAllDependencies = { packageJson ->
    def deps = []
    deps.addAll(packageJson.dependencies?.keySet() ?: [])
    deps.addAll(packageJson.devDependencies?.keySet() ?: [])
    return deps
}

ext.isBrickModule = { packageJson ->
    return packageJson?.brickModule != null
}

ext.runBrickCodegen = { workingDir, options = [:] ->
    def brickModuleDir = resolveModule(workingDir, "brick-module")
    if (brickModuleDir == null) {
        brickLog("brick-module not found, skipping code generation")
        return false
    }
    
    def codegenPath = new File(brickModuleDir, "bin/brick-codegen.js")
    if (!codegenPath.exists()) {
        brickLog("brick-codegen not found at ${codegenPath}")
        return false
    }
    
    try {
        def wdPath = (workingDir instanceof File) ? workingDir.absolutePath : workingDir
        def codegenArgs = [
            'node',
            codegenPath.absolutePath,
            '--platform',
            'android',
            '--projectRoot',
            wdPath
        ]
        if (options.noClean == true) {
            codegenArgs.add('--no-clean')
        }
        def proc = codegenArgs.execute(null, workingDir)
        proc.waitFor()
        return proc.exitValue() == 0
    } catch (Exception e) {
        brickLog("Failed to run brick-codegen: ${e.message}")
        return false
    }
}

// =============================================================================
// Main Configuration
// =============================================================================

ext.applyBrickModules = { settings, args ->
    def projectRootPath = args.projectRoot
    def appProjectName = args.appProject
    
    if (!projectRootPath) {
        throw new GradleException("Brick: projectRoot is required. Call applyBrickModules(settings, [projectRoot: '../', appProject: 'app'])")
    }
    
    if (!appProjectName) {
        throw new GradleException("Brick: appProject is required. Call applyBrickModules(settings, [projectRoot: '../', appProject: 'app'])")
    }
    
    // Support relative projectRoot (relative to settings.rootDir)
    def projectRootFile = new File(projectRootPath.toString())
    def projectRoot = (projectRootFile.isAbsolute() ? projectRootFile : new File(settings.rootDir, projectRootFile.path)).canonicalFile

    // Validate package.json exists in projectRoot
    def packageJsonFile = new File(projectRoot, 'package.json')
    if (!packageJsonFile.exists()) {
        throw new GradleException("Brick: package.json not found at ${projectRoot}. Please pass a valid projectRoot.")
    }

    def foundModules = []
    def brickModulesData = [:]
    
    // Read app's package.json
    def appPackageJson = readPackageJson(packageJsonFile)
    if (appPackageJson == null) {
        throw new GradleException("Could not find or parse package.json at ${projectRoot}")
    }
    
    // Store app package.json for later use
    settings.ext.appPackageJson = appPackageJson
    
    // Get all dependencies
    def allDeps = getAllDependencies(appPackageJson)
    
    // Always include brick-module if it exists
    def brickModuleDir = resolveModule(projectRoot, "brick-module")
    if (brickModuleDir != null) {
        def androidDir = new File(brickModuleDir, "android")
        if (androidDir.exists()) {
            settings.include(":brick-module")
            settings.project(":brick-module").projectDir = androidDir
            foundModules.add("brick-module")
        }
    }
    
    // Scan and include other brick modules
    allDeps.each { depName ->
        if (depName == "brick-module") return // Already handled
        
        def moduleDir = resolveModule(projectRoot, depName)
        if (moduleDir == null) return
        
        def packageJson = readPackageJson(new File(moduleDir, "package.json"))
        if (!isBrickModule(packageJson)) return
        
        // Check if autoRegister is enabled (default: true)
        def autoRegister = packageJson.brickModule.autoRegister != false
        if (!autoRegister) return
        
        def androidDir = new File(moduleDir, "android")
        if (androidDir.exists()) {
            // Convert npm package name to valid Gradle project name
            // Replace @ with empty and / with _
            def gradleProjectName = depName.replaceAll("^@", "").replaceAll("/", "_")
            
            settings.include(":${gradleProjectName}")
            settings.project(":${gradleProjectName}").projectDir = androidDir
            foundModules.add(depName)
            
            // Store module data for project configuration
            if (packageJson.brickModule.android?.package) {
                brickModulesData[depName] = [
                    moduleName: packageJson.brickModule.android.moduleName ?: depName,
                    packageName: packageJson.brickModule.android.package,
                    gradleProjectName: gradleProjectName
                ]
            }
        }
    }
    
    // Check if codegen is needed (use configured path)
    def androidBrickPath = getBrickAndroidPath(projectRoot)
    def brickDir = new File(androidBrickPath)
    def needsCodegen = !brickDir.exists() || !new File(brickDir, "src/main/kotlin/BrickModule.kt").exists()
    def codegenAttempted = false
    if (needsCodegen) {
        codegenAttempted = true
        runBrickCodegen(projectRoot, [noClean: true])
    }
    settings.ext.brickCodegenRan = codegenAttempted
    
    // Include generated module (use configured path)
    if (brickDir.exists()) {
        settings.include(":brick-codegen")
        settings.project(":brick-codegen").projectDir = brickDir
    }
    
    if (!foundModules.isEmpty()) {
        brickLog("Found modules: ${foundModules.join(', ')}")
    }
    
    // Configure app project after all projects are loaded
    settings.gradle.projectsLoaded {
        // Transfer data to root project
        gradle.rootProject.ext.brickModulesData = brickModulesData
        gradle.rootProject.ext.brickModulesList = foundModules
        gradle.rootProject.ext.brickProjectRoot = projectRoot
        gradle.rootProject.ext.brickAppProjectName = appProjectName
        gradle.rootProject.ext.brickCodegenRanInBuild =
            settings.ext.has("brickCodegenRan") ? settings.ext.brickCodegenRan : false
        configureAppProject(gradle)
        // Inline: ensure RN autolinking doesn't fail due to missing codegen/jni for brick-module
        gradle.rootProject.subprojects { subproj ->
            if (subproj.name == 'brick-module') {
                subproj.afterEvaluate {
                    try {
                        def dummyCMake = '''# Dummy CMakeLists.txt for React Native autolinking
# This file is required by React Native's autolinking system
# The actual TurboModule implementation is handled by brick-codegen in user projects
cmake_minimum_required(VERSION 3.13)
set(CMAKE_VERBOSE_MAKEFILE on)

# Create a dummy source file
file(WRITE ${CMAKE_CURRENT_BINARY_DIR}/dummy.cpp "// Dummy file for BrickModuleSpec\n")

# Create an empty static library to satisfy React Native's build system
add_library(react_codegen_BrickModuleSpec STATIC ${CMAKE_CURRENT_BINARY_DIR}/dummy.cpp)

# Set necessary properties
target_include_directories(react_codegen_BrickModuleSpec PUBLIC ${CMAKE_CURRENT_SOURCE_DIR})
'''

                        def prepareTask = subproj.tasks.findByName('prepareBrickModuleAutolinkCMake') ?: subproj.tasks.create('prepareBrickModuleAutolinkCMake') {
                            group = 'brick-module'
                            description = 'Creates a dummy CMakeLists.txt so RN autolinking can add_subdirectory for brick-module without error.'
                            
                            // Capture project reference for Configuration Cache compatibility
                            def buildDirProvider = subproj.layout.buildDirectory
                            def cmakeContent = dummyCMake

                            outputs.dir(buildDirProvider.dir('generated/source/codegen/jni'))

                            doLast {
                                def jniDir = buildDirProvider.asFile.get().toPath().resolve('generated/source/codegen/jni').toFile()
                                if (!jniDir.exists()) {
                                    jniDir.mkdirs()
                                }
                                def cmakeFile = new File(jniDir, 'CMakeLists.txt')
                                cmakeFile.text = cmakeContent
                                println("🧱 BrickModules: Prepared stub CMake at ${cmakeFile}")
                            }
                        }

                        if (subproj.tasks.findByName('preBuild')) {
                            subproj.preBuild.dependsOn(prepareTask)
                        }
                    } catch (Exception e) {
                        println("🧱 BrickModules: Failed to configure CMake stub for brick-module: ${e.message}")
                    }
                }
            }
        }

        // Note: We only wire the dependency for the app project below to avoid
        // introducing cycles across all subprojects.
    }
}

// Configure the app project
def configureAppProject(gradle) {
    def appProjectName = gradle.rootProject.ext.brickAppProjectName
    gradle.rootProject.subprojects { project ->
        if (project.name == appProjectName) {
            project.afterEvaluate {
                configureBrickModules(project)

                // If brick-module exists, make sure native-related tasks run after stub CMake is prepared
                def hasBrickModule = gradle.rootProject.subprojects.find { it.name == 'brick-module' } != null
                if (hasBrickModule) {
                    try {
                        // Run early in the build
                        project.preBuild.dependsOn(":brick-module:prepareBrickModuleAutolinkCMake")
                        // Also guard native/CMake tasks
                        project.tasks.matching { t ->
                            def n = t.name.toLowerCase()
                            return n.contains('extern') || n.contains('cmake')
                        }.all { t ->
                            t.dependsOn(":brick-module:prepareBrickModuleAutolinkCMake")
                        }
                    } catch (Exception e) {
                        println("🧱 BrickModules: Failed to wire CMake stub dependency: ${e.message}")
                    }
                }
            }
        }
    }
}

// Configure brick modules for the app project
def configureBrickModules(project) {
    def rootProject = project.rootProject
    def brickModulesData = rootProject.ext.brickModulesData
    def projectRoot = rootProject.ext.brickProjectRoot
    
    // Add source directory for generated code
    project.android.sourceSets.main.java.srcDir "${project.layout.buildDirectory.asFile.get()}/generated/source/brick-provider"
    
    // Create provider generation task
    project.tasks.create('generateBrickModulesList') {
        description = 'Generates BrickModulesList class for module injection in MainActivity'
        group = 'brick-module'

        // Capture values for Configuration Cache compatibility
        def modulesData = brickModulesData
        def buildDirProvider = project.layout.buildDirectory

        // Declare inputs and outputs for Configuration Cache compatibility
        inputs.property('brickModulesData', modulesData)
        outputs.dir(buildDirProvider.dir('generated/source/brick-provider'))

        doLast {
            // Inline generateProvider logic for Configuration Cache compatibility
            def modules = modulesData.collect { name, data ->
                [
                    moduleName: data.moduleName,
                    packageName: data.packageName
                ]
            }

            def outputDir = buildDirProvider.asFile.get().toPath().resolve('generated/source/brick-provider').toFile()
            outputDir.mkdirs()

            def imports = modules.collect { "import ${it.packageName}.${it.moduleName}" }.join("\n")
            def moduleInstances = modules.collect { "            ${it.moduleName}(context)" }.join(",\n")
            def moduleNames = modules.collect { "            \"${it.moduleName}\"" }.join(",\n")

            new File(outputDir, "BrickModulesList.kt").text = """
// Auto-generated by brick_modules.gradle
package com.brickmodule

import com.facebook.react.bridge.ReactContext
${imports}

/**
 * Auto-generated helper for brick modules
 * Use this class to get auto-linked modules in your MainActivity
 * 
 * Example usage:
 * ```kotlin
 * override fun getBrickModules(context: ReactContext): List<BrickModuleBase> {
 *     return BrickModulesList(context).modules
 * }
 * ```
 */
class BrickModulesList(private val context: ReactContext) {

    val modules: List<BrickModuleBase> by lazy {
        listOf<BrickModuleBase>(
${moduleInstances}
        )
    }

    val availableModules: List<String> = listOf(
${moduleNames}
    )

    companion object {
        /**
         * Legacy static method for backward compatibility
         * @deprecated Use BrickModulesList(context).modules instead
         */
        @Deprecated(
            message = "Use BrickModulesList(context).modules instead",
            replaceWith = ReplaceWith("BrickModulesList(context).modules")
        )
        @JvmStatic
        fun getAutolinkedModules(context: ReactContext): MutableList<Any> {
            return BrickModulesList(context).modules.toMutableList() as MutableList<Any>
        }
    }
}
"""
        }
    }
    
    // Hook into build process
    project.preBuild.dependsOn('generateBrickModulesList')
    project.preBuild.doFirst {
        def workingDir = projectRoot

        def alreadyRan = rootProject.ext.has("brickCodegenRanInBuild") ?
            rootProject.ext.brickCodegenRanInBuild : false
        if (alreadyRan) {
            // Avoid double-running if settings already executed codegen.
            return
        }
        rootProject.ext.brickCodegenRanInBuild = true

        // Run codegen once per build without cleaning outputs.
        try {
            def proc = ['node', '-p', "require.resolve('brick-module/package.json')"].execute(null, workingDir)
            proc.waitFor()
            
            if (proc.exitValue() == 0) {
                def packageJsonPath = proc.text.trim()
                if (packageJsonPath && !packageJsonPath.isEmpty()) {
                    def brickModuleDir = new File(packageJsonPath).parentFile
                    def codegenPath = new File(brickModuleDir, "bin/brick-codegen.js")
                    
                    if (codegenPath.exists()) {
                        def codegenArgs = [
                            'node',
                            codegenPath.absolutePath,
                            '--platform',
                            'android',
                            '--projectRoot',
                            workingDir.absolutePath,
                            '--no-clean'
                        ]
                        def codegenProc = codegenArgs.execute(null, workingDir)
                        codegenProc.waitFor()
                    }
                }
            }
        } catch (Exception e) {
            println("🧱 BrickModules: Failed to run brick-codegen: ${e.message}")
        }
    }
    
    // Add dependencies
    project.dependencies {
        // Add brick module dependencies
        brickLog("🔍 Processing subprojects for dependencies...")
        brickLog("📋 Available brick modules: ${brickModulesData.keySet()}")
        
        brickLog("🔍 Available subprojects: ${rootProject.subprojects.collect { it.name }}")
        
        rootProject.subprojects.each { subproject ->
            // Try to find matching brick module by normalizing names
            def foundModule = null
            def normalizedSubprojectName = subproject.name.replaceAll('[-_]', '')  // Remove both - and _
            
            brickModulesData.each { moduleKey, moduleData ->
                def normalizedModuleKey = moduleKey.replaceAll('[@/-]', '')
                
                if (normalizedSubprojectName == normalizedModuleKey) {
                    foundModule = moduleKey
                    return
                }
            }
            
            if (foundModule) {
                brickLog("✅ Adding brick module dependency: ${foundModule} (matched with ${subproject.name})")
                add('implementation', subproject)
            } else if (brickModulesData.containsKey(subproject.name)) {
                brickLog("✅ Adding brick module dependency: ${subproject.name}")
                add('implementation', subproject)
            }

            if (subproject.name == 'brick-module') { 
                brickLog("✅ Adding brick-module dependency")
                add('implementation', subproject)
            } 
            if (subproject.name == 'brick-codegen') { 
                brickLog("✅ Adding brick-codegen dependency")
                add('implementation', subproject)
            }
        }
        
        // Add required Kotlin dependencies
        add('implementation', "org.jetbrains.kotlinx:kotlinx-coroutines-core:1.6.4")
        add('implementation', "org.jetbrains.kotlinx:kotlinx-coroutines-android:1.6.4")
        add('implementation', "com.google.code.gson:gson:2.8.9")
    }
}
